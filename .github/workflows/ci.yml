name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pilot_mvp?schema=public
      NEXTAUTH_SECRET: ci-local-secret
      NEXTAUTH_URL: http://localhost:3000
      APP_BASE_URL: http://localhost:3000
      MONTHLY_CAP_USD: "10"
      PER_LESSON_CAP_USD: "0.2"
      BUDGET_MODE_AT_80_PERCENT: short_response_low_cost_model
      BUDGET_MODE_AT_100_PERCENT: stop_new_generation_review_only
      AUTH_ALLOW_ENV_FALLBACK: "true"
      UPLOAD_MAX_MB: "20"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
